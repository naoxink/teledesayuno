<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teledesayuno</title>
    <!-- SDK de Ably para navegador -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ====== TEMAS VISUALES ====== */

        /* 1. Cyberpunk (Tu oscuro original) */
        :root, [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --accent: #00bcd4;
            --border: #2d2d2d;
            --msg-bg: #161616;
            --input-bg: #252525;
        }

        /* 2. Modo Ofimática (Camuflaje total: clon de Excel/Word) */
        [data-theme="office"] {
            --bg: #f3f2f1;
            --surface: #ffffff;
            --text: #323130;
            --accent: #107c41; /* Verde corporativo de Microsoft */
            --border: #edebe9;
            --msg-bg: #faf9f8;
            --input-bg: #ffffff;
        }

        /* 3. Modo Corporativo (Estilo documentación técnica / Jira) */
        [data-theme="corporate"] {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --accent: #0052cc; /* Azul Atlassian */
            --border: #dfe1e6;
            --msg-bg: #ffffff;
            --input-bg: #fafbfc;
        }
        /* 4. Modo Terminal (Camuflaje informático clásico) 
        Si alguien pasa por detrás, parece que estás ejecutando un script en Bash o editando con Vim */
        [data-theme="terminal"] {
            --bg: #0c0c0c;
            --surface: #161616;
            --text: #cccccc;
            --accent: #00ff66; /* Verde fósforo de consola */
            --border: #333333;
            --msg-bg: #0c0c0c;
            --input-bg: #1a1a1a;
            font-family: 'Courier New', Courier, monospace; /* Forzamos fuente mono aquí */
        }

        /* 5. Modo IDE / VS Code (El camuflaje definitivo para ti)
        Imita los colores del tema 'Dark+' de Visual Studio Code. Parecerá que estás revisando un archivo de configuración */
        [data-theme="ide"] {
            --bg: #1e1e1e;
            --surface: #252526;
            --text: #d4d4d4;
            --accent: #4fc1ff; /* Azul de variables de VS Code */
            --border: #3c3c3c;
            --msg-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        /* 6. Modo GitHub Light (Camuflaje de documentación)
        Clona la paleta clara de GitHub. Parece que estás leyendo una Issue o revisando un Pull Request */
        [data-theme="github"] {
            --bg: #ffffff;
            --surface: #f6h8fa;
            --text: #24292f;
            --accent: #0969da; /* Azul clásico de enlaces de GitHub */
            --border: #d0d7de;
            --msg-bg: #ffffff;
            --input-bg: #ffffff;
        }

        /* 7. Modo Drácula (Estética pura)
        Este no es para esconderse, es simplemente porque la paleta Dracula es obligatoria en cualquier herramienta de un dev */
        [data-theme="dracula"] {
            --bg: #282a36;
            --surface: #44475a;
            --text: #f8f8f2;
            --accent: #ff79c6; /* Rosa Drácula */
            --border: #6272a4;
            --msg-bg: #21222c;
            --input-bg: #282a36;
        }

        /* ====== REAJUSTES DE TU CSS EXISTENTE ====== */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s; /* Para que el cambio de tema sea suave */
        }
        #login, #chat-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            max-width: 450px;
            margin: auto;
            width: 100%;
            box-sizing: border-box;
        }
        #chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
            max-width: 100%;
        }
        .form-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 0.8rem; margin-bottom: 4px; color: #888; }

        input, button {
            background: var(--input-bg); /* Antes estaba fijo en #252525 */
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); outline: none; }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { opacity: 0.9; }
        #messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--msg-bg); /* Antes estaba fijo en #161616 */
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: .9rem;
        }
        .msg { margin-bottom: 4px; line-height: 1.25; word-break: break-word; }
        .msg .time { color: #555; font-size: 0.75rem; margin-right: 6px; }
        .msg .system { color: #777; font-style: italic; font-size: 0.8rem; }
        .reply-preview {
            display: none;
            border: 1px solid var(--accent);
            background: rgba(0,188,212,0.08);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            width: auto;
            max-width: calc(100% - 24px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .reply-preview.visible {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .reply-preview strong { color: var(--accent); }
        .reply-preview .close-reply {
            cursor: pointer;
            color: var(--accent);
            font-weight: 700;
            flex-shrink: 0;
        }
        .reply-info {
            display: inline;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.9;
        }
        .msg.replying {
            background: rgba(0,188,212,0.08);
            border: 1px solid rgba(0,188,212,0.35);
        }
        .reply-block {
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 6px;
            opacity: 0.92;
            font-size: 0.88rem;
            color: #cfd8dc;
        }
        .reply-block .reply-author {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .reply-block .reply-text {
            white-space: pre-wrap;
        }
        .reply-button {
            background: transparent;
            border: none;
            color: var(--text);
            opacity: 0.55;
            cursor: pointer;
            padding: 0 4px;
            margin-left: 4px;
            font-size: 0.76rem;
            transition: opacity 0.15s ease, color 0.15s ease;
        }
        .reply-button:hover,
        .reply-button:focus {
            color: var(--accent);
            opacity: 0.9;
            text-decoration: none;
        }
        .msg:hover .reply-button {
            opacity: 0.85;
        }
        #input-area { display: flex; gap: 4px; position: relative; }
        #input-area input { flex: 1; }
        #mention-suggester {
            position: absolute;
            left: 0;
            right: auto;
            width: 100%;
            top: auto;
            bottom: calc(100% + 4px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 10px 20px rgba(0,0,0,.12);
            max-height: 220px;
            overflow-y: auto;
            z-index: 20;
            font-size: 0.9rem;
        }
        .mention-item {
            padding: 8px 10px;
            cursor: pointer;
            color: var(--text);
            transition: background 0.2s ease, color 0.2s ease;
        }
        .mention-item:hover {
            background: rgba(0, 0, 0, 0.08);
        }
        .mention-item.selected {
            background: rgba(0, 188, 212, 0.2);
            color: var(--accent);
            font-weight: 700;
        }
        .mention {
            color: var(--accent);
            font-weight: 700;
        }
        .clickable { cursor: pointer; }
        .mention.clickable:hover { text-decoration: underline; }
        .user.clickable { cursor: pointer; }
        .msg.mention-target {
            background: rgba(0, 188, 212, 0.12);
            border-left: 3px solid var(--accent);
            padding-left: 9px;
            margin-left: -9px;
        }
        .msg.mention-target .user {
            color: var(--accent);
        }
        #theme-select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 2px 6px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
    </style>
    <link rel="stylesheet" href="temas.css">
</head>
<body>

    <div style="position: fixed; top: 8px; right: 8px; z-index: 999;">
        <select id="theme-select" onchange="seleccionarTema(this.value)">
            <option value="dark">Cyberpunk (Oscuro)</option>
            <option value="corporate">Corporativo (Teams)</option>
            <option value="terminal">Consola (Bash)</option>
            <option value="ide">Editor (VS Code)</option>
            <option value="github">GitHub (Claro)</option>
            <option value="dracula">Dracula (Aesthetic)</option>
            <option value="nxk">nxk (Oscuro)</option>
        </select>
    </div>

    <!-- ACCESO -->
    <div id="login">
        <h4 style="margin: 0 0 12px 0; color: var(--accent);">Chat Privado P2P</h4>
        <div class="form-group" id="room-group">
            <label>ID de la Sala</label>
            <input type="text" id="room-id" placeholder="ej. sala-ocio">
        </div>

        <div id="room-preview" style="display: none; font-weight: bold; font-size: 1.1rem; color: var(--accent); margin-bottom: 12px;"></div>

        <div class="form-group">
            <label>Contraseña de Cifrado</label>
            <input type="password" id="password" placeholder="Clave secreta compartida" onkeypress="if (event.key === 'Enter') conectar()">
        </div>
        <button onclick="conectar()">Entrar</button>
    </div>

    <!-- PANEL DEL CHAT -->
    <div id="chat-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div>
                <span id="room-title" style="font-weight:bold; font-size:0.9rem; color:var(--accent);"></span>
                <span id="user-count" style="font-size:0.8rem; color:#777; margin-left:8px;"></span>
            </div>
            <span style="font-size:0.75rem; color:#555;">Cifrado de extremo a extremo • Efímero</span>
        </div>
        <div id="messages"></div>
        <div id="reply-preview" class="reply-preview" hidden></div>
        <div id="input-area" class="chat-input-wrapper">
            <input type="text" id="msg-input" placeholder="Mensaje seguro..." onkeypress="if(event.key==='Enter') enviar()">
            <div id="mention-suggester" class="mention-suggester" hidden></div>
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>

        let tieneElFoco = true;
        let unreadCount = 0;
        let tituloBase = "Teledesayuno"; // Título inicial por defecto
        let miAlias = '';
        let miembrosConectados = [];
        let aliasChangesPendientes = [];
        let mentionIndex = -1;
        let mentionMatches = [];
        let mentionNavigationActive = false;
        let replyTarget = null;
        const mensajesPorId = {};

        document.addEventListener('DOMContentLoaded', () => {
            // Leemos el hash de la URL eliminando la '#' inicial
            const hash = window.location.hash.trim();
            
            if (hash && hash.length > 1) {
                // decodeURIComponent limpia caracteres raros o espacios en la URL
                const salaId = decodeURIComponent(hash.substring(1)).toLowerCase();
                
                // Rellenamos el input invisible (sigue haciendo falta para la función conectar)
                document.getElementById('room-id').value = salaId;
                
                // Ocultamos el input original
                document.getElementById('room-group').style.display = 'none';
                
                // NUEVO: Activamos y pintamos el preview en azul/cyan
                const preview = document.getElementById('room-preview');
                preview.innerText = `#${salaId}`;
                preview.style.display = 'block';
                
                // Ponemos el cursor directamente en el campo de la contraseña
                document.getElementById('password').focus();

                document.getElementById('theme-select').value = localStorage.getItem('chat-theme') || 'dark';
            }

            const input = document.getElementById('msg-input');
            input.addEventListener('input', handleMentionInput);
            input.addEventListener('keydown', handleMentionKeydown);

            const messagesBox = document.getElementById('messages');
            messagesBox.addEventListener('click', (event) => {
                const button = event.target.closest('.reply-button');
                if (!button) return;
                const id = button.dataset.msgId;
                if (!id) return;
                const original = mensajesPorId[id];
                if (!original) return;
                establecerReplyTarget({ id: original.id, autor: original.autor, texto: original.texto });
            });
        });

        function actualizarMiembrosConectados(members) {
            miembrosConectados = (members || [])
                .map(member => member.clientId)
                .filter(Boolean)
                .filter(alias => alias !== miAlias);
        }

        function registrarCambioAlias(oldAlias, newAlias) {
            aliasChangesPendientes = aliasChangesPendientes
                .filter(item => Date.now() - item.ts < 5000);
            aliasChangesPendientes.push({ oldAlias, newAlias, ts: Date.now() });
        }

        function procesarEventoCambioAlias(tipo, alias) {
            aliasChangesPendientes = aliasChangesPendientes
                .filter(item => Date.now() - item.ts < 5000);
            return aliasChangesPendientes.find(item =>
                (tipo === 'leave' && alias === item.oldAlias) ||
                (tipo === 'enter' && alias === item.newAlias)
            ) || null;
        }

        function highlightMentionSuggester(index) {
            const items = document.querySelectorAll('#mention-suggester .mention-item');
            items.forEach((item, idx) => {
                item.classList.toggle('selected', idx === index);
            });
        }

        function renderMentionSuggester(matches) {
            const box = document.getElementById('mention-suggester');
            if (!matches || matches.length === 0) {
                return esconderMentionSuggester();
            }

            box.innerHTML = matches.map((alias, idx) => {
                return `<div class="mention-item${idx === mentionIndex ? ' selected' : ''}" data-alias="${escaparHTML(alias)}">${escaparHTML(alias)}</div>`;
            }).join('');

            box.hidden = false;
            mentionNavigationActive = false;
            highlightMentionSuggester(mentionIndex);

            box.querySelectorAll('.mention-item').forEach(item => {
                item.addEventListener('mousedown', (event) => {
                    event.preventDefault();
                    insertarMention(event.currentTarget.dataset.alias);
                });
            });
        }

        function esconderMentionSuggester() {
            const box = document.getElementById('mention-suggester');
            box.hidden = true;
            box.innerHTML = '';
            mentionMatches = [];
            mentionIndex = -1;
        }

        function insertarMention(alias) {
            const input = document.getElementById('msg-input');
            const caret = input.selectionStart;
            const before = input.value.slice(0, caret);
            const after = input.value.slice(caret);
            const match = before.match(/(?:^|\s)@([^\s@]*)$/);
            if (!match) return esconderMentionSuggester();

            const start = before.lastIndexOf('@');
            const replacement = before.slice(0, start) + '@' + alias + ' ';
            input.value = replacement + after;
            const newPos = replacement.length;
            input.focus();
            input.setSelectionRange(newPos, newPos);
            esconderMentionSuggester();
        }

        function handleMentionInput() {
            const input = document.getElementById('msg-input');
            const caret = input.selectionStart;
            const before = input.value.slice(0, caret);
            const match = before.match(/(?:^|\s)@([^\s@]*)$/);

            if (!match) {
                return esconderMentionSuggester();
            }

            const query = match[1].trim().toLowerCase();
            mentionMatches = miembrosConectados
                .filter(alias => alias.toLowerCase().includes(query))
                .slice(0, 8);

            if (mentionMatches.length === 0) {
                return esconderMentionSuggester();
            }

            mentionIndex = 0;
            mentionNavigationActive = false;
            renderMentionSuggester(mentionMatches);
        }

        function handleMentionKeydown(event) {
            const box = document.getElementById('mention-suggester');
            if (box.hidden) return;

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                mentionNavigationActive = true;
                mentionIndex = (mentionIndex + 1) % mentionMatches.length;
                highlightMentionSuggester(mentionIndex);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                mentionNavigationActive = true;
                mentionIndex = (mentionIndex - 1 + mentionMatches.length) % mentionMatches.length;
                highlightMentionSuggester(mentionIndex);
            } else if (event.key === 'Enter') {
                if (mentionNavigationActive && mentionMatches[mentionIndex]) {
                    event.preventDefault();
                    insertarMention(mentionMatches[mentionIndex]);
                }
            } else if (event.key === 'Escape') {
                esconderMentionSuggester();
            }
        }

        function ejecutarComandoSiHay(texto) {

            const cmd = texto.split(' ')[0].toLowerCase();
            switch(cmd) {
                case '/clear':
                    limpiarMensajesUsuario();
                    agregarMensajeSistema('Se han eliminado localmente todos los mensajes de usuarios.');
                    return false;
                case '/theme':
                    const nuevoTema = prompt('Introduce el nombre del tema (dark, office, corporate, terminal, ide, github, dracula):');
                    if (nuevoTema) {
                        seleccionarTema(nuevoTema);
                        agregarMensajeSistema(`Tema cambiado a <strong>${nuevoTema}</strong>.`);
                    }
                    return false;
                case '/alias':
                    let nuevoAlias = '';
                    if (texto.split(' ').length > 1) {
                        nuevoAlias = texto.split(' ').slice(1).join(' ');
                    } else {
                        nuevoAlias = prompt('Introduce tu nuevo alias:');
                    }
                    if (nuevoAlias) {
                        const aliasAntiguo = miAlias;
                        const aliasLimpio = nuevoAlias.trim().substring(0, 20);
                        if (aliasLimpio && aliasLimpio !== miAlias) {
                            miAlias = aliasLimpio;
                            return { tipo: 'alias-change', aliasAntiguo, aliasNuevo: miAlias };
                        }
                    }
                    return false;
                case '/shrug':
                    const emoticono = '¯\\_(ツ)_/¯';
                    return `${emoticono} ${texto.replace(cmd, '').trim()}`;
                case '/lenny':
                    const lenny = '( ͡° ͜ʖ ͡°)';
                    return `${lenny} ${texto.replace(cmd, '').trim()}`;
                case '/tableflip':
                    const tableflip = '(╯°□°）╯︵ ┻━┻';
                    return `${tableflip} ${texto.replace(cmd, '').trim()}`;
                case '/unflip':
                    const unflip = '┬─┬ ノ( ゜-゜ノ)';
                    return `${unflip} ${texto.replace(cmd, '').trim()}`;
                case '/help':
                    agregarMensajeSistema('Mostrando comandos disponibles. También puedes escribir /help para ver esta lista de nuevo.');
                    agregarMensajeSistema('- /clear - Limpiar mensajes de usuarios localmente');
                    agregarMensajeSistema('- /theme - Cambiar tema visual');
                    agregarMensajeSistema('- /alias - Cambiar tu alias');
                    agregarMensajeSistema('- /shrug - Añadir emoticono ¯\\_(ツ)_/¯');
                    agregarMensajeSistema('- /lenny - Añadir emoticono ( ͡° ͜ʖ ͡°)');
                    agregarMensajeSistema('- /tableflip - Añadir emoticono (╯°□°）╯︵ �━┻');
                    agregarMensajeSistema('- /unflip - Añadir emoticono ┬─┬ ノ( ゜-゜ノ)');
                    return false;
            }

            return texto;

        }


        const ABLY_KEY = 'HYoAwg.Z1gnlA:nNwRcynU1A-55wN9Wt7jnNBAGft-Izu1ONLs2RNzE54';

        const encoder = new TextEncoder();
        const decoder = new TextDecoder();
        let claveCriptografica = null;
        let canalGlobal = null;

        // MOTOR CRIPTOGRÁFICO (Web Crypto API)
        async function generarClave(password, salaId) {
            const passwordBuffer = encoder.encode(password);
            const saltBuffer = encoder.encode(`salt-${salaId}`); // Salt único por sala
            const baseKey = await crypto.subtle.importKey("raw", passwordBuffer, "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: saltBuffer, iterations: 100000, hash: "SHA-256" },
                baseKey,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function cifrarMensaje(texto, clave) {
            const iv = crypto.getRandomValues(new Uint8Array(12)); // IV de 12 bytes para AES-GCM
            const bufferCifrado = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, clave, encoder.encode(texto));
            return {
                msg: btoa(String.fromCharCode(...new Uint8Array(bufferCifrado))),
                iv: btoa(String.fromCharCode(...iv))
            };
        }

        async function descifrarMensaje(ciphertextBase64, ivBase64, clave) {
            try {
                const ciphertext = new Uint8Array(atob(ciphertextBase64).split("").map(c => c.charCodeAt(0)));
                const iv = new Uint8Array(atob(ivBase64).split("").map(c => c.charCodeAt(0)));
                const bufferDescifrado = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, clave, ciphertext);
                return decoder.decode(bufferDescifrado);
            } catch (e) {
                throw new Error("Clave inválida");
            }
        }

        // LÓGICA DE CONTROL
        async function conectar() {
            const salaId = document.getElementById('room-id').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!salaId || !password) return alert("Introduce sala y contraseña.");

            if (window.Notification && Notification.permission === "default") {
                Notification.requestPermission();
            }

            window.location.hash = encodeURIComponent(salaId);

            // 1. Derivar clave criptográfica simétrica
            claveCriptografica = await generarClave(password, salaId);

            if (!miAlias) {
                miAlias = generarAliasAleatorio();
            }

            // 2. Transición de UI
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('room-title').innerText = `#${salaId}`;

            tituloBase = `Teledesayuno #${salaId}`;
            document.title = tituloBase;

            // 1. Instanciamos Ably sin clientId global
            const ably = new Ably.Realtime({ key: ABLY_KEY });
            canalGlobal = ably.channels.get(`sala-${salaId}`);

            // 2. Traemos los usuarios conectados actuales antes de decidir nuestro alias
            const miembrosActuales = await new Promise((resolve) => {
                canalGlobal.presence.get((err, members) => resolve(members || []));
            });

            actualizarMiembrosConectados(miembrosActuales);

            // 3. Generamos el alias base y comprobamos si ya está ocupado en la sala
            const aliasBase = generarAliasAleatorio();
            const estaRepetido = miembrosActuales.some(m => m.clientId === aliasBase);

            if (estaRepetido) {
                // Si ya hay un "Mapache Ninja" dentro, a nosotros nos añade el número
                const num = Math.floor(10 + Math.random() * 90);
                miAlias = `${aliasBase} #${num}`;
            } else {
                // Si la pista está libre, nos quedamos con el alias limpio
                miAlias = aliasBase;
            }
            agregarMensajeSistema(`Has entrado a la sala. Tu alias temporal es: <strong style="color:var(--accent)">${miAlias}</strong>`);

            // MODIFICACIÓN 2: Escuchar quién entra y quién sale de la sala
            // Cuando alguien entra:
            canalGlobal.presence.subscribe('enter', (member) => {
                const cambio = procesarEventoCambioAlias('enter', member.clientId);
                if (cambio) {
                    if (!miembrosConectados.includes(member.clientId)) {
                        miembrosConectados.push(member.clientId);
                    }
                    actualizarContador();
                    return;
                }
                if (member.clientId !== miAlias) {
                    agregarMensajeSistema(`🟢 <strong>${escaparHTML(member.clientId)}</strong> se ha conectado.`);
                    if (!miembrosConectados.includes(member.clientId)) {
                        miembrosConectados.push(member.clientId);
                    }
                }
                actualizarContador();
            });

            // Cuando alguien se va (o cierra la pestaña):
            canalGlobal.presence.subscribe('leave', (member) => {
                const cambio = procesarEventoCambioAlias('leave', member.clientId);
                if (cambio) {
                    miembrosConectados = miembrosConectados.filter(alias => alias !== member.clientId);
                    actualizarContador();
                    return;
                }
                agregarMensajeSistema(`🔴 <strong>${escaparHTML(member.clientId)}</strong> se ha desconectado.`);
                miembrosConectados = miembrosConectados.filter(alias => alias !== member.clientId);
                actualizarContador();
            });

            // MODIFICACIÓN 3: Decirle a Ably que nos meta en la lista de presentes de la sala
            canalGlobal.presence.enterClient(miAlias);
            actualizarContador();

            // Escuchar mensajes entrantes de Ably
            canalGlobal.subscribe('msg', async (item) => {
                try {
                    // El payload viene en item.data
                    const textoDescifrado = await descifrarMensaje(item.data.msg, item.data.iv, claveCriptografica);
                    // Parseamos el JSON que viene de dentro del escudo criptográfico
                    const datos = JSON.parse(textoDescifrado);

                    if (datos.tipo === 'alias-change') {
                        agregarMensajeSistema(`🔁 El alias <strong>${escaparHTML(datos.aliasAntiguo)}</strong> ha cambiado a <strong>${escaparHTML(datos.aliasNuevo)}</strong>.`);
                        registrarCambioAlias(datos.aliasAntiguo, datos.aliasNuevo);
                        return;
                    }

                    if (datos.autor !== miAlias && !tieneElFoco) {
                        // 1. Incrementamos el contador local
                        unreadCount++;

                        if (unreadCount === 1) {
                            agregarBarraSinLeer()
                        }

                        // 2. Modificamos el título de la pestaña: ej. "(3) #sala-ocio"
                        document.title = `(${unreadCount}) ${tituloBase}`;

                        // 3. Lanzamos la notificación nativa (tu código anterior)
                        if (Notification.permission === "granted") {
                            const notification = new Notification(`#${salaId} - ${datos.autor}`, {
                                body: datos.texto,
                                tag: 'chat-notification',
                                renotify: true
                            });
                            notification.onclick = () => {
                                window.focus();
                                document.querySelector('#msg-input').focus();
                                notification.close();
                            };
                        }
                    }

                    // Pasamos el autor y el texto a la pantalla
                    agregarMensajePantalla(datos.autor, datos.texto, datos.replyTo ?? null, datos.id ?? null);
                } catch (err) {
                    // Si falla el descifrado (error de integridad o clave incorrecta), ignoramos el mensaje en silencio
                    console.warn("Mensaje descartado: Clave incorrecta o manipulación de datos.");
                }
            });
        }

        async function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (!texto || !canalGlobal) return;

            input.value = '';

            const comandoEjecutado = ejecutarComandoSiHay(texto);
            if (!comandoEjecutado) {
                if (replyTarget) cancelarReply();
                return;
            }

            if (typeof comandoEjecutado === 'object' && comandoEjecutado.tipo === 'alias-change') {
                if (replyTarget) cancelarReply();
                await manejarCambioAlias(comandoEjecutado.aliasAntiguo, comandoEjecutado.aliasNuevo);
                return;
            }

            const messageId = generarIdMensaje();
            const paqueteDatos = {
                id: messageId,
                autor: miAlias,
                texto: comandoEjecutado
            };

            if (replyTarget) {
                paqueteDatos.replyTo = {
                    id: replyTarget.id,
                    autor: replyTarget.autor,
                    texto: replyTarget.texto
                };
            }

            // Ciframos localmente antes de enviar a la red
            const payloadCifrado = await cifrarMensaje(JSON.stringify(paqueteDatos), claveCriptografica);
            
            // Publicamos directamente al canal de Ably
            canalGlobal.publish('msg', payloadCifrado);

            if (replyTarget) {
                cancelarReply();
            }
        }

        async function manejarCambioAlias(aliasAntiguo, aliasNuevo) {
            registrarCambioAlias(aliasAntiguo, aliasNuevo);

            if (canalGlobal) {
                const paqueteCambio = {
                    autor: aliasNuevo,
                    tipo: 'alias-change',
                    aliasAntiguo,
                    aliasNuevo
                };

                const payloadCifrado = await cifrarMensaje(JSON.stringify(paqueteCambio), claveCriptografica);
                canalGlobal.publish('msg', payloadCifrado);

                try {
                    canalGlobal.presence.leaveClient(aliasAntiguo);
                } catch (err) {
                    console.warn('No se pudo salir del alias antiguo:', err);
                }
                canalGlobal.presence.enterClient(aliasNuevo);

                canalGlobal.presence.get((err, members) => {
                    if (!err) {
                        actualizarMiembrosConectados(members);
                    }
                });
            }
        }

        function limpiarMensajesUsuario() {
            const box = document.getElementById('messages');
            const mensajes = Array.from(box.querySelectorAll('.msg'));

            mensajes.forEach(msg => {
                if (!msg.querySelector('.system')) {
                    msg.remove();
                }
            });

            eliminarBarraSinLeer();
            unreadCount = 0;
            document.title = tituloBase;
            box.scrollTop = box.scrollHeight;
        }

        function agregarMensajePantalla(autor, texto, replyTo = null, messageId = null) {
            const box = document.getElementById('messages');
            const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (messageId) {
                mensajesPorId[messageId] = { id: messageId, autor, texto, replyTo };
            }

            const colorAutor = obtenerColorPorAlias(autor);
            const esMio = (autor === miAlias);
            const esMencionado = contieneMiMencion(texto);
            const claseMensaje = esMencionado ? 'msg mention-target' : 'msg';
            const replyHtml = replyTo ? `
                <div class="reply-block">
                    <span class="reply-author">En respuesta a ${escaparHTML(replyTo.autor)}:</span>
                    <span class="reply-text">${escaparHTML(replyTo.texto)}</span>
                </div>` : '';

            box.innerHTML += `
                <div class="${claseMensaje}" data-msg-id="${escaparHTML(messageId || '')}">
                    ${replyHtml}
                    <span class="time">${hora}</span>
                    ${messageId ? `<button type="button" class="reply-button" title="Responder" data-msg-id="${escaparHTML(messageId)}">Resp</button>` : ''}
                    <span class="user ${esMio ? 'own' : ''} clickable" data-alias="${escaparHTML(autor)}" style="color: ${colorAutor}; font-weight: bold;">[${escaparHTML(autor)}]:</span>
                    <span>${resaltarMenciones(texto)}</span>
                </div>
            `;

            const nuevo = box.lastElementChild;
            if (nuevo) {
                nuevo.querySelectorAll('.clickable').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        const alias = el.dataset.alias;
                        if (alias) insertarMention(alias);
                    });
                });

                nuevo.querySelectorAll('.reply-button').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        const id = el.dataset.msgId;
                        if (!id) return;
                        const original = mensajesPorId[id];
                        if (!original) return;
                        establecerReplyTarget({ id: original.id, autor: original.autor, texto: original.texto });
                    });
                });
            }

            box.scrollTop = box.scrollHeight;
        }

        function contieneMiMencion(texto) {
            if (!miAlias) return false;
            const aliasEscapado = miAlias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`@${aliasEscapado}(?=\\b)`, 'i');
            return regex.test(texto);
        }

        function resaltarMenciones(texto) {
            const textoEscapado = escaparHTML(texto);
            const aliases = [...new Set([miAlias, ...miembrosConectados].filter(Boolean))];
            if (aliases.length === 0) {
                return textoEscapado;
            }

            const patrones = aliases
                .sort((a, b) => b.length - a.length)
                .map(alias => alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
                .join('|');

            const regex = new RegExp(`@(${patrones})(?=\\b)`, 'g');
            return textoEscapado.replace(regex, '<span class="mention clickable" data-alias="$1">@$1</span>');
        }

        function agregarMensajeSistema(texto) {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="msg"><span class="system">${texto}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function establecerReplyTarget(target) {
            if (replyTarget && replyTarget.id) {
                const prev = document.querySelector(`.msg[data-msg-id="${replyTarget.id}"]`);
                if (prev) prev.classList.remove('replying');
            }
            replyTarget = target;
            const preview = document.getElementById('reply-preview');
            preview.innerHTML = `
                <span class="close-reply" onclick="cancelarReply()">×</span>
                Respondiendo a <strong>${escaparHTML(target.autor)}</strong>: <span class="reply-info">${escaparHTML(target.texto)}</span>
            `;
            preview.classList.add('visible');
            preview.hidden = false;
            if (target.id) {
                const targetMsg = document.querySelector(`.msg[data-msg-id="${target.id}"]`);
                if (targetMsg) targetMsg.classList.add('replying');
            }
        }

        function cancelarReply() {
            if (replyTarget && replyTarget.id) {
                const targetMsg = document.querySelector(`.msg[data-msg-id="${replyTarget.id}"]`);
                if (targetMsg) targetMsg.classList.remove('replying');
            }
            replyTarget = null;
            const preview = document.getElementById('reply-preview');
            preview.classList.remove('visible');
            preview.hidden = true;
            preview.innerHTML = '';
        }

        function generarIdMensaje() {
            if (window.crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return Array.from({ length: 16 }, () => Math.floor(Math.random() * 16).toString(16)).join('');
        }

        function agregarBarraSinLeer() {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="unread-bar">Mensajes sin leer</div>`;
        }

        function eliminarBarraSinLeer() {
            const bar = document.querySelector('.unread-bar')
            if (bar) bar.parentNode.removeChild(bar)
        }

        function escaparHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        const ANIMALES_Y_COSA = ["Nutria", "Mapache", "Calamar", "Capibara", "Croqueta", "Pangolín", "Chistorra", "Paloma", "Gatito", "Keyup", "Churro", "Miniboss", "Jefe", "Manta", "Regleta", "Tiburón martillo"];
        const ADJETIVOS = ["espacial", "ninja", "radioactivo", "sideral", "táctico", "cuántico", "asesino", "chulapo", "anónimo", "con retraso", "aburrido", "excelente"];

        function generarAliasAleatorio() {
            const animal = ANIMALES_Y_COSA[Math.floor(Math.random() * ANIMALES_Y_COSA.length)];
            const adjetivo = ADJETIVOS[Math.floor(Math.random() * ADJETIVOS.length)];
            return `${animal} ${adjetivo}`;
        }

        // 1. FUNCIÓN PARA CAMBIAR Y GUARDAR EL TEMA
        function seleccionarTema(tema) {
            // Aplicamos el atributo al nodo HTML principal
            document.documentElement.setAttribute('data-theme', tema);
            // Guardamos la preferencia
            localStorage.setItem('chat-theme', tema);
            
            // Sincronizamos el valor del select por si acaso
            const select = document.getElementById('theme-select');
            if (select) select.value = tema;
        }

        // 2. APLICACIÓN INMEDIATA (Pon esto al principio de tu <script> para evitar el "chispazo" blanco/oscuro)
        const temaGuardado = localStorage.getItem('chat-theme') || 'dark';
        seleccionarTema(temaGuardado);

        // 3. SELECCIÓN DE COLOR ADAPTATIVA (Sustituye tu función existente)
        function obtenerColorPorAlias(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            
            // Si el tema actual es uno de los claros, bajamos el brillo al 35% para que el texto sea legible
            const temaActual = localStorage.getItem('chat-theme') || 'dark';
            const lightness = (temaActual === 'office' || temaActual === 'corporate') ? '35%' : '65%';
            
            return `hsl(${hue}, 75%, ${lightness})`;
        }

        function actualizarContador() {
            // Pedimos a Ably el array de miembros presentes en este canal
            canalGlobal.presence.get((err, members) => {
                if (err) return console.error("Error al obtener presencia:", err);
                
                const conectados = members.length;
                const texto = `• ${conectados} conectado${conectados !== 1 ? 's' : ''}`;
                
                document.getElementById('user-count').innerText = texto;
            });
        }

        window.addEventListener('focus', () => {
            tieneElFoco = true;
            
            // Limpiamos las alertas solo si teníamos mensajes pendientes
            if (unreadCount > 0) {
                setTimeout(() => eliminarBarraSinLeer(), 3000);
            } else {
                eliminarBarraSinLeer();
            }
            
            unreadCount = 0;
            document.title = tituloBase; // Restaura el título original
        });

        window.addEventListener('blur', () => {
            tieneElFoco = false;
        });
    </script>
</body>
