<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teledesayuno</title>
    <!-- SDK de Ably para navegador -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        /* ====== TEMAS VISUALES ====== */

        /* 1. Cyberpunk (Tu oscuro original) */
        :root, [data-theme="dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #e0e0e0;
            --accent: #00bcd4;
            --border: #2d2d2d;
            --msg-bg: #161616;
            --input-bg: #252525;
        }

        /* 2. Modo Ofimática (Camuflaje total: clon de Excel/Word) */
        [data-theme="office"] {
            --bg: #f3f2f1;
            --surface: #ffffff;
            --text: #323130;
            --accent: #107c41; /* Verde corporativo de Microsoft */
            --border: #edebe9;
            --msg-bg: #faf9f8;
            --input-bg: #ffffff;
        }

        /* 3. Modo Corporativo (Estilo documentación técnica / Jira) */
        [data-theme="corporate"] {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --text: #172b4d;
            --accent: #0052cc; /* Azul Atlassian */
            --border: #dfe1e6;
            --msg-bg: #ffffff;
            --input-bg: #fafbfc;
        }
        /* 4. Modo Terminal (Camuflaje informático clásico) 
        Si alguien pasa por detrás, parece que estás ejecutando un script en Bash o editando con Vim */
        [data-theme="terminal"] {
            --bg: #0c0c0c;
            --surface: #161616;
            --text: #cccccc;
            --accent: #00ff66; /* Verde fósforo de consola */
            --border: #333333;
            --msg-bg: #0c0c0c;
            --input-bg: #1a1a1a;
            font-family: 'Courier New', Courier, monospace; /* Forzamos fuente mono aquí */
        }

        /* 5. Modo IDE / VS Code (El camuflaje definitivo para ti)
        Imita los colores del tema 'Dark+' de Visual Studio Code. Parecerá que estás revisando un archivo de configuración */
        [data-theme="ide"] {
            --bg: #1e1e1e;
            --surface: #252526;
            --text: #d4d4d4;
            --accent: #4fc1ff; /* Azul de variables de VS Code */
            --border: #3c3c3c;
            --msg-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        /* 6. Modo GitHub Light (Camuflaje de documentación)
        Clona la paleta clara de GitHub. Parece que estás leyendo una Issue o revisando un Pull Request */
        [data-theme="github"] {
            --bg: #ffffff;
            --surface: #f6h8fa;
            --text: #24292f;
            --accent: #0969da; /* Azul clásico de enlaces de GitHub */
            --border: #d0d7de;
            --msg-bg: #ffffff;
            --input-bg: #ffffff;
        }

        /* 7. Modo Drácula (Estética pura)
        Este no es para esconderse, es simplemente porque la paleta Dracula es obligatoria en cualquier herramienta de un dev */
        [data-theme="dracula"] {
            --bg: #282a36;
            --surface: #44475a;
            --text: #f8f8f2;
            --accent: #ff79c6; /* Rosa Drácula */
            --border: #6272a4;
            --msg-bg: #21222c;
            --input-bg: #282a36;
        }

        /* ====== REAJUSTES DE TU CSS EXISTENTE ====== */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s; /* Para que el cambio de tema sea suave */
        }
        #login, #chat-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            max-width: 450px;
            margin: auto;
            width: 100%;
            box-sizing: border-box;
        }
        #chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
            max-width: 100%;
        }
        .form-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 0.8rem; margin-bottom: 4px; color: #888; }

        input, button {
            background: var(--input-bg); /* Antes estaba fijo en #252525 */
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--accent); outline: none; }
        button {
            background: var(--accent);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { opacity: 0.9; }
        #messages {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--msg-bg); /* Antes estaba fijo en #161616 */
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: .9rem;
        }
        .msg { margin-bottom: 4px; line-height: 1.25; word-break: break-word; }
        .msg .time { color: #555; font-size: 0.75rem; margin-right: 6px; }
        .msg .system { color: #777; font-style: italic; font-size: 0.8rem; }
        #input-area { display: flex; gap: 4px; }
        #input-area input { flex: 1; }
        #theme-select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 2px 6px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
    </style>
    <link rel="stylesheet" href="temas.css">
</head>
<body>

    <div style="position: fixed; top: 8px; right: 8px; z-index: 999;">
        <select id="theme-select" onchange="seleccionarTema(this.value)">
            <option value="dark">Cyberpunk (Oscuro)</option>
            <option value="corporate">Corporativo (Teams)</option>
            <option value="terminal">Consola (Bash)</option>
            <option value="ide">Editor (VS Code)</option>
            <option value="github">GitHub (Claro)</option>
            <option value="dracula">Dracula (Aesthetic)</option>
            <option value="nxk">nxk (Oscuro)</option>
        </select>
    </div>

    <!-- ACCESO -->
    <div id="login">
        <h4 style="margin: 0 0 12px 0; color: var(--accent);">Chat Privado P2P</h4>
        <div class="form-group" id="room-group">
            <label>ID de la Sala</label>
            <input type="text" id="room-id" placeholder="ej. sala-ocio">
        </div>

        <div id="room-preview" style="display: none; font-weight: bold; font-size: 1.1rem; color: var(--accent); margin-bottom: 12px;"></div>

        <div class="form-group">
            <label>Contraseña de Cifrado</label>
            <input type="password" id="password" placeholder="Clave secreta compartida" onkeypress="if (event.key === 'Enter') conectar()">
        </div>
        <button onclick="conectar()">Entrar</button>
    </div>

    <!-- PANEL DEL CHAT -->
    <div id="chat-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div>
                <span id="room-title" style="font-weight:bold; font-size:0.9rem; color:var(--accent);"></span>
                <span id="user-count" style="font-size:0.8rem; color:#777; margin-left:8px;"></span>
            </div>
            <span style="font-size:0.75rem; color:#555;">Cifrado de extremo a extremo • Efímero</span>
        </div>
        <div id="messages"></div>
        <div id="input-area" class="chat-input-wrapper">
            <input type="text" id="msg-input" placeholder="Mensaje seguro..." onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">Enviar</button>
        </div>
    </div>

    <script>

        let tieneElFoco = true;
        let unreadCount = 0;
        let tituloBase = "Teledesayuno"; // Título inicial por defecto

        document.addEventListener('DOMContentLoaded', () => {
            // Leemos el hash de la URL eliminando la '#' inicial
            const hash = window.location.hash.trim();
            
            if (hash && hash.length > 1) {
                // decodeURIComponent limpia caracteres raros o espacios en la URL
                const salaId = decodeURIComponent(hash.substring(1)).toLowerCase();
                
                // Rellenamos el input invisible (sigue haciendo falta para la función conectar)
                document.getElementById('room-id').value = salaId;
                
                // Ocultamos el input original
                document.getElementById('room-group').style.display = 'none';
                
                // NUEVO: Activamos y pintamos el preview en azul/cyan
                const preview = document.getElementById('room-preview');
                preview.innerText = `#${salaId}`;
                preview.style.display = 'block';
                
                // Ponemos el cursor directamente en el campo de la contraseña
                document.getElementById('password').focus();

                document.getElementById('theme-select').value = localStorage.getItem('chat-theme') || 'dark';
            }
        });

        function ejecutarComandoSiHay(texto) {
            if (texto === '/clear') {
                limpiarMensajesUsuario();
                agregarMensajeSistema('Se han eliminado localmente todos los mensajes de usuarios.');
                return false;
            }

            switch(texto) {
                case '/clear':
                    limpiarMensajesUsuario();
                    agregarMensajeSistema('Se han eliminado localmente todos los mensajes de usuarios.');
                    return false;
                case '/theme':
                    const nuevoTema = prompt('Introduce el nombre del tema (dark, office, corporate, terminal, ide, github, dracula):');
                    if (nuevoTema) {
                        seleccionarTema(nuevoTema);
                        agregarMensajeSistema(`Tema cambiado a <strong>${nuevoTema}</strong>.`);
                    }
                    return false;
                case '/alias':
                    const nuevoAlias = prompt('Introduce tu nuevo alias:');
                    if (nuevoAlias) {
                        miAlias = nuevoAlias.trim().substring(0, 20); // Limitar a 20 caracteres
                        agregarMensajeSistema(`Tu alias ha sido cambiado a <strong>${escaparHTML(miAlias)}</strong>.`);
                    }
                    return false;
                case '/shrug':
                    const emoticono = '¯\\_(ツ)_/¯';
                    return `${emoticono} ${texto.replace('/shrug', '').trim()}`;
                case '/lenny':
                    const lenny = '( ͡° ͜ʖ ͡°)';
                    return `${lenny} ${texto.replace('/lenny', '').trim()}`;
                case '/tableflip':
                    const tableflip = '(╯°□°）╯︵ ┻━┻';
                    return `${tableflip} ${texto.replace('/tableflip', '').trim()}`;
                case '/unflip':
                    const unflip = '┬─┬ ノ( ゜-゜ノ)';
                    return `${unflip} ${texto.replace('/unflip', '').trim()}`;
                case '/help':
                    const comandos = `
                        Comandos disponibles:
                        /clear - Limpiar mensajes de usuarios localmente
                        /theme - Cambiar tema visual
                        /alias - Cambiar tu alias
                        /shrug - Añadir emoticono ¯\\_(ツ)_/¯
                        /lenny - Añadir emoticono ( ͡° ͜ʖ ͡°)
                        /tableflip - Añadir emoticono (╯°□°）╯︵ ┻━┻
                        /unflip - Añadir emoticono ┬─┬ ノ( ゜-゜ノ)
                    `;
                    alert(comandos);
                    return false;
            }

            return texto;

        }


        const ABLY_KEY = 'HYoAwg.Z1gnlA:nNwRcynU1A-55wN9Wt7jnNBAGft-Izu1ONLs2RNzE54';

        const encoder = new TextEncoder();
        const decoder = new TextDecoder();
        let claveCriptografica = null;
        let canalGlobal = null;

        // MOTOR CRIPTOGRÁFICO (Web Crypto API)
        async function generarClave(password, salaId) {
            const passwordBuffer = encoder.encode(password);
            const saltBuffer = encoder.encode(`salt-${salaId}`); // Salt único por sala
            const baseKey = await crypto.subtle.importKey("raw", passwordBuffer, "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: saltBuffer, iterations: 100000, hash: "SHA-256" },
                baseKey,
                { name: "AES-GCM", length: 256 },
                false,
                ["encrypt", "decrypt"]
            );
        }

        async function cifrarMensaje(texto, clave) {
            const iv = crypto.getRandomValues(new Uint8Array(12)); // IV de 12 bytes para AES-GCM
            const bufferCifrado = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, clave, encoder.encode(texto));
            return {
                msg: btoa(String.fromCharCode(...new Uint8Array(bufferCifrado))),
                iv: btoa(String.fromCharCode(...iv))
            };
        }

        async function descifrarMensaje(ciphertextBase64, ivBase64, clave) {
            try {
                const ciphertext = new Uint8Array(atob(ciphertextBase64).split("").map(c => c.charCodeAt(0)));
                const iv = new Uint8Array(atob(ivBase64).split("").map(c => c.charCodeAt(0)));
                const bufferDescifrado = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, clave, ciphertext);
                return decoder.decode(bufferDescifrado);
            } catch (e) {
                throw new Error("Clave inválida");
            }
        }

        // LÓGICA DE CONTROL
        async function conectar() {
            const salaId = document.getElementById('room-id').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!salaId || !password) return alert("Introduce sala y contraseña.");

            if (window.Notification && Notification.permission === "default") {
                Notification.requestPermission();
            }

            window.location.hash = encodeURIComponent(salaId);

            // 1. Derivar clave criptográfica simétrica
            claveCriptografica = await generarClave(password, salaId);

            miAlias = generarAliasAleatorio();

            // 2. Transición de UI
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('room-title').innerText = `#${salaId}`;

            tituloBase = `Teledesayuno #${salaId}`;
            document.title = tituloBase;

            // 1. Instanciamos Ably sin clientId global
            const ably = new Ably.Realtime({ key: ABLY_KEY });
            canalGlobal = ably.channels.get(`sala-${salaId}`);

            // 2. Traemos los usuarios conectados actuales antes de decidir nuestro alias
            const miembrosActuales = await new Promise((resolve) => {
                canalGlobal.presence.get((err, members) => resolve(members || []));
            });

            // 3. Generamos el alias base y comprobamos si ya está ocupado en la sala
            const aliasBase = generarAliasAleatorio();
            const estaRepetido = miembrosActuales.some(m => m.clientId === aliasBase);

            if (estaRepetido) {
                // Si ya hay un "Mapache Ninja" dentro, a nosotros nos añade el número
                const num = Math.floor(10 + Math.random() * 90);
                miAlias = `${aliasBase} #${num}`;
            } else {
                // Si la pista está libre, nos quedamos con el alias limpio
                miAlias = aliasBase;
            }
            agregarMensajeSistema(`Has entrado a la sala. Tu alias temporal es: <strong style="color:var(--accent)">${miAlias}</strong>`);

            // MODIFICACIÓN 2: Escuchar quién entra y quién sale de la sala
            // Cuando alguien entra:
            canalGlobal.presence.subscribe('enter', (member) => {
                if (member.clientId !== miAlias) {
                    agregarMensajeSistema(`🟢 <strong>${escaparHTML(member.clientId)}</strong> se ha conectado.`);
                }
                actualizarContador();
            });

            // Cuando alguien se va (o cierra la pestaña):
            canalGlobal.presence.subscribe('leave', (member) => {
                agregarMensajeSistema(`🔴 <strong>${escaparHTML(member.clientId)}</strong> se ha desconectado.`);
                actualizarContador();
            });

            // MODIFICACIÓN 3: Decirle a Ably que nos meta en la lista de presentes de la sala
            canalGlobal.presence.enterClient(miAlias);
            actualizarContador();

            // Escuchar mensajes entrantes de Ably
            canalGlobal.subscribe('msg', async (item) => {
                try {
                    // El payload viene en item.data
                    const textoDescifrado = await descifrarMensaje(item.data.msg, item.data.iv, claveCriptografica);
                    // Parseamos el JSON que viene de dentro del escudo criptográfico
                    const datos = JSON.parse(textoDescifrado);

                    if (datos.autor !== miAlias && !tieneElFoco) {
                        // 1. Incrementamos el contador local
                        unreadCount++;

                        if (unreadCount === 1) {
                            agregarBarraSinLeer()
                        }

                        // 2. Modificamos el título de la pestaña: ej. "(3) #sala-ocio"
                        document.title = `(${unreadCount}) ${tituloBase}`;

                        // 3. Lanzamos la notificación nativa (tu código anterior)
                        if (Notification.permission === "granted") {
                            const notification = new Notification(`#${salaId} - ${datos.autor}`, {
                                body: datos.texto,
                                tag: 'chat-notification',
                                renotify: true
                            });
                            notification.onclick = () => {
                                window.focus();
                                document.querySelector('#msg-input').focus();
                                notification.close();
                            };
                        }
                    }

                    // Pasamos el autor y el texto a la pantalla
                    agregarMensajePantalla(datos.autor, datos.texto);
                } catch (err) {
                    // Si falla el descifrado (error de integridad o clave incorrecta), ignoramos el mensaje en silencio
                    console.warn("Mensaje descartado: Clave incorrecta o manipulación de datos.");
                }
            });
        }

        async function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (!texto || !canalGlobal) return;

            input.value = '';

            const comandoEjecutado = ejecutarComandoSiHay(texto);
            if (!comandoEjecutado) return; // Si el texto era un comando y acaba aquí

            // Creamos la estructura con el alias incluido
            const paqueteDatos = {
                autor: miAlias,
                texto: comandoEjecutado
            };

            // Ciframos localmente antes de enviar a la red
            const payloadCifrado = await cifrarMensaje(JSON.stringify(paqueteDatos), claveCriptografica);
            
            // Publicamos directamente al canal de Ably
            canalGlobal.publish('msg', payloadCifrado);
        }

        function limpiarMensajesUsuario() {
            const box = document.getElementById('messages');
            const mensajes = Array.from(box.querySelectorAll('.msg'));

            mensajes.forEach(msg => {
                if (!msg.querySelector('.system')) {
                    msg.remove();
                }
            });

            eliminarBarraSinLeer();
            unreadCount = 0;
            document.title = tituloBase;
            box.scrollTop = box.scrollHeight;
        }

        function agregarMensajePantalla(autor, texto) {
            const box = document.getElementById('messages');
            const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Obtenemos el color único para este alias basándonos en su nombre
            const colorAutor = obtenerColorPorAlias(autor);
            
            // Si quieres un pequeño indicador visual para tus propios mensajes, 
            // podemos añadir un subrayado o un estilo extra opcional
            const esMio = (autor === miAlias);

            box.innerHTML += `
                <div class="msg">
                    <span class="time">${hora}</span>
                    <span class="user ${esMio ? 'own' : ''}" style="color: ${colorAutor}; font-weight: bold;">[${escaparHTML(autor)}]:</span> 
                    <span>${escaparHTML(texto)}</span>
                </div>
            `;
            box.scrollTop = box.scrollHeight;
        }

        function agregarMensajeSistema(texto) {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="msg"><span class="system">${texto}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function agregarBarraSinLeer() {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="unread-bar">Mensajes sin leer</div>`;
        }

        function eliminarBarraSinLeer() {
            const bar = document.querySelector('.unread-bar')
            if (bar) bar.parentNode.removeChild(bar)
        }

        function escaparHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        const ANIMALES_Y_COSA = ["Nutria", "Mapache", "Calamar", "Capibara", "Croqueta", "Pangolín", "Chistorra", "Paloma", "Gatito", "Keyup", "Churro", "Miniboss", "Jefe", "Manta", "Regleta", "Tiburón martillo"];
        const ADJETIVOS = ["espacial", "ninja", "radioactivo", "sideral", "táctico", "cuántico", "asesino", "chulapo", "anónimo", "con retraso", "aburrido", "excelente"];

        let miAlias = "";

        function generarAliasAleatorio() {
            const animal = ANIMALES_Y_COSA[Math.floor(Math.random() * ANIMALES_Y_COSA.length)];
            const adjetivo = ADJETIVOS[Math.floor(Math.random() * ADJETIVOS.length)];
            return `${animal} ${adjetivo}`;
        }

        // 1. FUNCIÓN PARA CAMBIAR Y GUARDAR EL TEMA
        function seleccionarTema(tema) {
            // Aplicamos el atributo al nodo HTML principal
            document.documentElement.setAttribute('data-theme', tema);
            // Guardamos la preferencia
            localStorage.setItem('chat-theme', tema);
            
            // Sincronizamos el valor del select por si acaso
            const select = document.getElementById('theme-select');
            if (select) select.value = tema;
        }

        // 2. APLICACIÓN INMEDIATA (Pon esto al principio de tu <script> para evitar el "chispazo" blanco/oscuro)
        const temaGuardado = localStorage.getItem('chat-theme') || 'dark';
        seleccionarTema(temaGuardado);

        // 3. SELECCIÓN DE COLOR ADAPTATIVA (Sustituye tu función existente)
        function obtenerColorPorAlias(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            
            // Si el tema actual es uno de los claros, bajamos el brillo al 35% para que el texto sea legible
            const temaActual = localStorage.getItem('chat-theme') || 'dark';
            const lightness = (temaActual === 'office' || temaActual === 'corporate') ? '35%' : '65%';
            
            return `hsl(${hue}, 75%, ${lightness})`;
        }

        function actualizarContador() {
            // Pedimos a Ably el array de miembros presentes en este canal
            canalGlobal.presence.get((err, members) => {
                if (err) return console.error("Error al obtener presencia:", err);
                
                const conectados = members.length;
                const texto = `• ${conectados} conectado${conectados !== 1 ? 's' : ''}`;
                
                document.getElementById('user-count').innerText = texto;
            });
        }

        window.addEventListener('focus', () => {
            tieneElFoco = true;
            
            // Limpiamos las alertas solo si teníamos mensajes pendientes
            if (unreadCount > 0) {
                setTimeout(() => eliminarBarraSinLeer(), 3000);
            } else {
                eliminarBarraSinLeer();
            }
            
            unreadCount = 0;
            document.title = tituloBase; // Restaura el título original
        });

        window.addEventListener('blur', () => {
            tieneElFoco = false;
        });
    </script>
</body>
</html>
